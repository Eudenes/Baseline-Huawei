<!doctype html>

<head>

  <title>BASELINE HUAWEI</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/S6EvitM.png">
  <style>
    :root{--bg:#f6f8fa;--card:#fff;--accent:#0f62fe;--muted:#666}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; background:var(--bg); margin:0; padding:24px; color:#111}
    .container{max-width:980px;margin:0 auto;}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
    h1{font-size:20px;margin:0}
    .card{background:var(--card);border-radius:10px;padding:16px;box-shadow:0 6px 18px rgba(18,38,63,0.06);margin-bottom:12px}
    label{display:block;font-size:13px;margin-bottom:6px;color:var(--muted)}
    textarea{width:97%;min-height:100px;padding:10px;border-radius:8px;border:1px solid #ddd;resize:vertical;font-family:monospace}
    .row{display:flex;gap:12px;align-items:center}
    .col{flex: 1 1 45%; min-width: 280px;}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    button{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600}
    button.secondary{background:#e6eef9;color:#003087}
    button.ghost{background:transparent;color:var(--muted);border:1px solid #ddd}
    .small{font-size:13px;padding:6px 10px;border-radius:6px}
    .meta{font-size:13px;color:var(--muted);margin-top:8px}
    .footer{font-size:13px;color:var(--muted);text-align:center;margin-top:18px}
    .inline{display:inline-block}
    .count{font-weight:700;color:#0053a6;margin-left:6px}
    .error{color:#b00020;font-weight:600}
    @media (max-width:700px){header{flex-direction:column;align-items:flex-start}}
  </style>
</head>

    const outputEl = document.getElementById('output');
    const count4G = document.getElementById('count4G');
    const count5G = document.getElementById('count5G');
    const outCountEl = document.getElementById('outCount');
    const lastOpEl = document.getElementById('lastOp');

    function parseLines(textarea) {
      return textarea.value.replace(/\r/g,'').split('\n').map(l => l.trim()).filter(l => l !== '');
    }

    function replace4G(template, id) {
      return template.replace(/LOCALCELLID=[^,;]+/gi, 'LOCALCELLID=' + id);
    }

    function replace5G(template, id) {
      return template
        .replace(/NRCELLID=[^,;]+/gi, 'NRCELLID=' + id)
        .replace(/NRDUCELLID=[^,;]+/gi, 'NRDUCELLID=' + id);
    }

    function generate() {
      const templates = templatesEl.value.split('\n').map(t => t.trim()).filter(t => t !== '');
      const lines4G = parseLines(input4G);
      const lines5G = parseLines(input5G);

      count4G.textContent = lines4G.length;
      count5G.textContent = lines5G.length;
      lastOpEl.textContent = '';

      if (templates.length === 0) {
        lastOpEl.innerHTML = '<span class="error">Nenhum template definido.</span>';
        return;
      }

      const results = [];

      for (const tpl of templates) {
        if (/LOCALCELLID=/i.test(tpl)) {
          for (const id of lines4G) results.push(replace4G(tpl, id));
        } else if (/NRCELLID=|NRDUCELLID=/i.test(tpl)) {
          for (const id of lines5G) results.push(replace5G(tpl, id));
        } else {
          results.push(tpl); // sem placeholder detectado
        }
      }

      outputEl.value = results.join('\n');
      outCountEl.textContent = results.length;
      lastOpEl.textContent = 'Geração concluída — veja a saída.';
    }

    document.getElementById('generate').addEventListener('click', generate);

    document.getElementById('copy').addEventListener('click', () => {
      if (!outputEl.value) return;
      outputEl.select();
      document.execCommand('copy');
      lastOpEl.textContent = 'Conteúdo copiado para a área de transferência.';
      window.getSelection().removeAllRanges();
    });

    document.getElementById('download').addEventListener('click', () => {
      if (!outputEl.value) return;
      const blob = new Blob([outputEl.value], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'resultado_baseline.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      lastOpEl.textContent = 'Arquivo gerado para download.';
    });

    document.getElementById('clearInput').addEventListener('click', () => {
      input4G.value = '';
      input5G.value = '';
      count4G.textContent = '0';
      count5G.textContent = '0';
      lastOpEl.textContent = 'Entradas limpas.';
    });

    document.getElementById('clearOutput').addEventListener('click', () => {
      outputEl.value = '';
      outCountEl.textContent = '0';
      lastOpEl.textContent = 'Saída limpa.';
    });

    input4G.addEventListener('input', () => count4G.textContent = parseLines(input4G).length);
    input5G.addEventListener('input', () => count5G.textContent = parseLines(input5G).length);
  </script>
</body>
</html>
